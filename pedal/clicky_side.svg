<?xml version="1.0" encoding="UTF-8"?>
<!--
  clicky_side.svg - Clements 47 clicky-pen pitch mechanism.
  Rendered-CAD-style side elevation matching the reference render
  at clickypen.jpg.  1:1 mm scale.  Installed in the neck: barrel axis
  vertical, tri-lobed flange seated on the OUTER face of the plywood,
  shaft passes through the plywood into the string gap, paddle engages
  the string.

  Parts (top to bottom, colour-matched to the reference render):
    * green pusher            (#4CAF50)
    * translucent gray barrel (#d8d8d8, fill-opacity 0.6)
    * pink cam sleeve         (#f4b0a0) - visible through the barrel,
                                crenellated upper edge
    * blue tri-lobed flange   (#3f51b5) - three ears with screw holes
    * retaining ring          (small gear-like disc below the flange)
    * shaft + paddle          (inside the string gap, tangent to string)

  Dimensions kept to a few key numbers (OD 12, stroke 4, plywood 6,
  gap 12.7).  No section hatching.

  Barrel axis runs vertically, origin at the axis / top of the flange.
  +x : forward (toward the string)
  +y : DOWN (SVG)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="160mm" height="200mm"
     viewBox="-80 -110 160 200">

  <defs>
    <!-- soft vertical gradients to hint at cylindrical shading -->
    <linearGradient id="gradGreen" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#2e7a33"/>
      <stop offset="45%"  stop-color="#5bbd5f"/>
      <stop offset="100%" stop-color="#2e7a33"/>
    </linearGradient>

    <linearGradient id="gradBarrel" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#b8b8b8"/>
      <stop offset="45%"  stop-color="#ececec"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </linearGradient>

    <linearGradient id="gradPink" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#c88576"/>
      <stop offset="45%"  stop-color="#f4b0a0"/>
      <stop offset="100%" stop-color="#c88576"/>
    </linearGradient>

    <linearGradient id="gradFlange" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#283593"/>
      <stop offset="45%"  stop-color="#5c6bc0"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>

    <linearGradient id="gradShaft" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#777"/>
      <stop offset="45%"  stop-color="#c5c5c5"/>
      <stop offset="100%" stop-color="#777"/>
    </linearGradient>

    <linearGradient id="gradPlyFace" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#b07a43"/>
      <stop offset="50%"  stop-color="#d49868"/>
      <stop offset="100%" stop-color="#b07a43"/>
    </linearGradient>

    <style>
      .out   { stroke:#333; stroke-width:0.6; fill:none; }
      .outf  { stroke:#333; stroke-width:0.4; fill:none; }
      .thin  { stroke:#555; stroke-width:0.3; fill:none; }
      .ghost { stroke:#333; stroke-width:0.45; fill:none;
               stroke-dasharray:1.4,1.0; opacity:0.75; }
      .cl    { stroke:#7070a0; stroke-width:0.25; fill:none;
               stroke-dasharray:3,1,0.3,1; }
      .lead  { stroke:#333; stroke-width:0.25; fill:none; }

      .title { font-family:sans-serif; font-size:4.2px;
               fill:#111; font-weight:700; }
      .cap   { font-family:sans-serif; font-size:2.6px; fill:#333; }
      .lbl   { font-family:sans-serif; font-size:2.9px;
               fill:#111; font-weight:600; }
      .dim   { font-family:sans-serif; font-size:2.6px; fill:#222; }
      .note  { font-family:sans-serif; font-size:2.3px; fill:#555; }
    </style>

    <marker id="arr" viewBox="0 0 8 8" refX="7" refY="4"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#333"/>
    </marker>
  </defs>

  <!-- ======================================================================
       TITLE / CAPTION
       ====================================================================== -->
  <text class="title" x="-78" y="-103">
    Clicky pen (paddle engages string at nat/sharp pitch)
  </text>
  <text class="cap" x="-78" y="-98.5">
    Rendered-view elevation, 1:1 mm.  Side installed in the neck plywood.
  </text>
  <text class="cap" x="-78" y="-94.5">
    Cam geometry derived from Thingiverse 99950 (destroyer2012, ballpoint click-cam).
  </text>

  <!-- ======================================================================
       CENTRE LINE
       ====================================================================== -->
  <line class="cl" x1="0" y1="-90" x2="0" y2="70"/>

  <!-- ======================================================================
       GREEN PUSHER (top)
         OD 10 mm, H 25 mm. Sits above the barrel.  Its lower 8 mm are
         inside the barrel (visible through the translucent gray).
       ====================================================================== -->
  <!-- Pusher body (outside the barrel): y from -88 to -68 (20 mm proud) -->
  <rect x="-5" y="-88" width="10" height="20"
        fill="url(#gradGreen)" stroke="#333" stroke-width="0.6"
        rx="0.6" ry="0.6"/>
  <!-- Top ellipse (cylinder cap) -->
  <ellipse cx="0" cy="-88" rx="5" ry="1.3"
           fill="#7ed080" stroke="#333" stroke-width="0.5"/>
  <!-- Bottom-of-proud-section line (where the pusher enters the barrel) -->
  <ellipse cx="0" cy="-68" rx="5" ry="1.3"
           fill="#4CAF50" stroke="#333" stroke-width="0.4" opacity="0.85"/>

  <!-- Pusher segment INSIDE the barrel (seen through translucent gray):
       drawn with lower opacity so the barrel tint reads.  y from -68 to -58.
       Draw this BEFORE the barrel so the barrel translucency washes it. -->
  <rect x="-5" y="-68" width="10" height="12"
        fill="#4CAF50" fill-opacity="0.9"
        stroke="#333" stroke-width="0.35"/>

  <!-- ======================================================================
       PINK CAM SLEEVE (inside the barrel)
         Sits in the middle of the barrel.  Crenellated top edge meets
         the pusher.  Smooth lower section tapers to the shaft.
         Drawn BEFORE the barrel so the translucency washes over it.
       ====================================================================== -->
  <!-- Crenellated top (sawtooth) -->
  <path d="M -4.2,-55
           L -3.2,-58 L -2.2,-55
           L -1.2,-58 L -0.2,-55
           L  0.8,-58 L  1.8,-55
           L  2.8,-58 L  3.8,-55
           L  4.2,-55 L  4.2,-35 L -4.2,-35 Z"
        fill="url(#gradPink)" stroke="#333" stroke-width="0.45"/>

  <!-- Cam body (smooth lower cylinder) -->
  <rect x="-4.2" y="-35" width="8.4" height="28"
        fill="url(#gradPink)" stroke="#333" stroke-width="0.45"/>

  <!-- Subtle cam-helix hint (the slot that steers the click) -->
  <path class="thin"
        d="M -4.2,-30 C -2.5,-24 2.5,-22 4.2,-16"
        stroke="#8a4a3c" stroke-width="0.35"/>
  <path class="thin"
        d="M -4.2,-18 C -2.5,-12 2.5,-10 4.2,-8"
        stroke="#8a4a3c" stroke-width="0.35"/>

  <!-- Cam bottom cap -->
  <ellipse cx="0" cy="-7" rx="4.2" ry="1.1"
           fill="#c88576" stroke="#333" stroke-width="0.4"/>

  <!-- ======================================================================
       TRANSLUCENT GRAY BARREL
         OD 12 mm, H 58 mm.  Drawn AFTER pusher-inside and cam so the
         translucency washes them.
       ====================================================================== -->
  <rect x="-6" y="-58" width="12" height="58"
        fill="url(#gradBarrel)" fill-opacity="0.55"
        stroke="#333" stroke-width="0.7"
        rx="0.5" ry="0.5"/>

  <!-- Top lip ellipse (pusher enters here) -->
  <ellipse cx="0" cy="-58" rx="6" ry="1.5"
           fill="#cfcfcf" fill-opacity="0.6"
           stroke="#333" stroke-width="0.55"/>

  <!-- Subtle vertical highlight on the barrel to read as cylindrical -->
  <line x1="-3.2" y1="-57" x2="-3.2" y2="-1"
        stroke="#ffffff" stroke-width="0.35" opacity="0.55"/>
  <line x1=" 3.2" y1="-57" x2=" 3.2" y2="-1"
        stroke="#666666" stroke-width="0.35" opacity="0.4"/>

  <!-- Bottom ellipse (where the barrel meets the flange) -->
  <ellipse cx="0" cy="0" rx="6" ry="1.5"
           fill="#b8b8b8" fill-opacity="0.7"
           stroke="#333" stroke-width="0.55"/>

  <!-- ======================================================================
       BLUE TRI-LOBED FLANGE
         Three ears 120 deg apart.  In a side view two rear ears appear
         symmetrically on either side and the front ear is foreshortened
         forward of the barrel.  Each ear is a rounded lobe with a small
         screw hole (Ø 3 mm).
         Flange y : 0 .. 4   (4 mm thick disc).  Lobes stick out to
         x = +/- 14 on the sides (rear lobes) and a front lobe drawn
         foreshortened as a flatter arc behind the barrel silhouette.
       ====================================================================== -->

  <!-- Central disc (seen edge-on, 4 mm thick, OD 13 mm) -->
  <rect x="-6.5" y="0" width="13" height="4"
        fill="url(#gradFlange)" stroke="#333" stroke-width="0.5"/>

  <!-- Left-rear lobe (elliptical ear) -->
  <path d="M -6.5,0.5
           C -10,0.5 -13,1.0 -13.5,2
           C -13,3.0 -10,3.5 -6.5,3.5
           Z"
        fill="url(#gradFlange)" stroke="#333" stroke-width="0.5"/>
  <!-- Screw hole, left ear -->
  <ellipse cx="-10.5" cy="2" rx="1.5" ry="0.9"
           fill="#1a237e" stroke="#111" stroke-width="0.3"/>
  <!-- Countersink ring -->
  <ellipse cx="-10.5" cy="2" rx="1.9" ry="1.1"
           fill="none" stroke="#1a237e" stroke-width="0.25" opacity="0.8"/>

  <!-- Right-rear lobe -->
  <path d="M 6.5,0.5
           C 10,0.5 13,1.0 13.5,2
           C 13,3.0 10,3.5 6.5,3.5
           Z"
        fill="url(#gradFlange)" stroke="#333" stroke-width="0.5"/>
  <ellipse cx="10.5" cy="2" rx="1.5" ry="0.9"
           fill="#1a237e" stroke="#111" stroke-width="0.3"/>
  <ellipse cx="10.5" cy="2" rx="1.9" ry="1.1"
           fill="none" stroke="#1a237e" stroke-width="0.25" opacity="0.8"/>

  <!-- Front lobe (pointing toward viewer, foreshortened as an arc in front) -->
  <path d="M -5.5,3.8
           C -4.5,5.6  4.5,5.6  5.5,3.8
           Z"
        fill="url(#gradFlange)" stroke="#333" stroke-width="0.5"/>
  <!-- Front lobe screw hole (oval, foreshortened) -->
  <ellipse cx="0" cy="4.8" rx="1.3" ry="0.5"
           fill="#1a237e" stroke="#111" stroke-width="0.25"/>

  <!-- Top-of-flange outline to read as thickness -->
  <line class="outf" x1="-6.5" y1="0" x2="6.5" y2="0"/>

  <!-- Retaining ring / splined washer below the flange (small gear-like disc) -->
  <ellipse cx="0" cy="5.2" rx="4.6" ry="1.1"
           fill="#c9c9c9" stroke="#333" stroke-width="0.4"/>
  <!-- Gear teeth hint (small marks around the rim) -->
  <g stroke="#555" stroke-width="0.2">
    <line x1="-4.6" y1="5.2" x2="-4.9" y2="5.2"/>
    <line x1="-3.5" y1="5.9" x2="-3.7" y2="6.1"/>
    <line x1="-2.0" y1="6.25" x2="-2.1" y2="6.45"/>
    <line x1=" 0.0" y1="6.35" x2=" 0.0" y2="6.6"/>
    <line x1=" 2.0" y1="6.25" x2=" 2.1" y2="6.45"/>
    <line x1=" 3.5" y1="5.9"  x2=" 3.7" y2="6.1"/>
    <line x1=" 4.6" y1="5.2"  x2=" 4.9" y2="5.2"/>
    <line x1="-3.5" y1="4.5"  x2="-3.7" y2="4.3"/>
    <line x1="-2.0" y1="4.15" x2="-2.1" y2="3.95"/>
    <line x1=" 2.0" y1="4.15" x2=" 2.1" y2="3.95"/>
    <line x1=" 3.5" y1="4.5"  x2=" 3.7" y2="4.3"/>
  </g>

  <!-- ======================================================================
       PLYWOOD SHEETS (side section).  6 mm thick each, 12.7 mm gap.
         NORTH sheet: y = 6 .. 12   (clicky flange sits on its top face).
         SOUTH sheet: y = 24.7 .. 30.7
       Drilled hole in the NORTH sheet at x = 0 for the shaft (Ø 6.5).
       ====================================================================== -->
  <!-- North plywood -->
  <path d="M -50,6   L -3.25,6   M  3.25,6   L 50,6
           M -50,12  L  50,12
           M -50,6   L -50,12
           M  50,6   L  50,12"
        class="out"/>
  <rect x="-50" y="6" width="46.75" height="6"
        fill="url(#gradPlyFace)" stroke="none" opacity="0.85"/>
  <rect x="3.25" y="6" width="46.75" height="6"
        fill="url(#gradPlyFace)" stroke="none" opacity="0.85"/>
  <line x1="-3.25" y1="6"  x2="-3.25" y2="12" class="out"/>
  <line x1=" 3.25" y1="6"  x2=" 3.25" y2="12" class="out"/>

  <!-- South plywood -->
  <rect x="-50" y="24.7" width="100" height="6"
        fill="url(#gradPlyFace)" stroke="#8b4513" stroke-width="0.5"
        opacity="0.85"/>

  <!-- Wood grain hints (light) -->
  <g stroke="#9a6a3a" stroke-width="0.2" opacity="0.4">
    <line x1="-48" y1="7.5"  x2="-5"   y2="7.5"/>
    <line x1="-48" y1="9.0"  x2="-5"   y2="9.0"/>
    <line x1="-48" y1="10.5" x2="-5"   y2="10.5"/>
    <line x1="  5" y1="7.5"  x2="48"   y2="7.5"/>
    <line x1="  5" y1="9.0"  x2="48"   y2="9.0"/>
    <line x1="  5" y1="10.5" x2="48"   y2="10.5"/>
    <line x1="-48" y1="26.2" x2="48"   y2="26.2"/>
    <line x1="-48" y1="28.0" x2="48"   y2="28.0"/>
    <line x1="-48" y1="29.6" x2="48"   y2="29.6"/>
  </g>

  <!-- ======================================================================
       SHAFT (extended state) + PADDLE
         Shaft Ø 6 mm, passes through the Ø 6.5 hole in the north sheet
         into the string gap.  Paddle at the shaft tip engages the string.
       ====================================================================== -->
  <!-- Shaft, extended: from y = 6 (bottom of flange + retaining ring) down
       through the plywood (6..12) into the gap, tip at y = 22 -->
  <rect x="-3" y="6" width="6" height="16"
        fill="url(#gradShaft)" stroke="#333" stroke-width="0.45"/>

  <!-- Paddle (trapezoidal) at the shaft tip, inside the gap.
       16 mm long along the string (edge-on in this view so we see its
       16 mm span across x) x 5 mm thick x 6 mm tall.
       Drawn as a horizontal trapezoid tangent to the string. -->
  <path d="M -8,22 L -7,24 L 7,24 L 8,22 Z"
        fill="#d0c090" stroke="#333" stroke-width="0.5"/>
  <!-- Paddle thickness side -->
  <rect x="-8" y="22" width="16" height="0.5"
        fill="#a08060" stroke="#333" stroke-width="0.3"/>

  <!-- Nose pin (small red-circle tangent stop at the string) -->
  <circle cx="0" cy="24.2" r="0.7" fill="#b0907a" stroke="#333" stroke-width="0.2"/>

  <!-- String: small red circle, viewed end-on at the pitch point -->
  <circle cx="0" cy="25.0" r="0.55" fill="#c00000" stroke="#700000" stroke-width="0.15"/>

  <!-- ======================================================================
       RETRACTED GHOST (dashed, shifted +4 mm up = 4 mm stroke)
       ====================================================================== -->
  <g class="ghost">
    <!-- Shaft retracted (4 mm shorter into gap) -->
    <rect x="-3" y="6" width="6" height="12" fill="none"/>
    <!-- Paddle retracted (4 mm higher) -->
    <path d="M -8,18 L -7,20 L 7,20 L 8,18 Z"/>
    <!-- Nose ghost -->
    <circle cx="0" cy="20.2" r="0.7"/>
  </g>
  <text class="note" x="9" y="19.5">retracted (3 mm air gap)</text>

  <!-- 4 mm stroke callout -->
  <line x1="-12" y1="20" x2="-12" y2="24"
        stroke="#333" stroke-width="0.3"
        marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text class="dim" x="-19" y="23">stroke 4 mm</text>

  <!-- ======================================================================
       LABELS / LEADER LINES
       ====================================================================== -->
  <!-- Pusher -->
  <line class="lead" x1="5" y1="-80" x2="32" y2="-80"/>
  <text class="lbl"  x="33" y="-79">pusher (green, OD 10 mm)</text>
  <text class="note" x="33" y="-76.5">press to click: extend / retract</text>

  <!-- Barrel -->
  <line class="lead" x1="6" y1="-40" x2="32" y2="-40"/>
  <text class="lbl"  x="33" y="-39">barrel (translucent, OD 12 mm)</text>
  <text class="note" x="33" y="-36.5">main clicky housing, L 58 mm</text>

  <!-- Cam sleeve -->
  <line class="lead" x1="-4.2" y1="-48" x2="-32" y2="-48"/>
  <text class="lbl"  x="-68" y="-49">cam sleeve (pink)</text>
  <text class="note" x="-68" y="-46.5">crenellated teeth latch on</text>
  <text class="note" x="-68" y="-44"  >a click; rotates 30 deg / press</text>

  <!-- Flange -->
  <line class="lead" x1="-13" y1="2.5" x2="-32" y2="-4"/>
  <text class="lbl"  x="-68" y="-5">tri-lobed flange (blue)</text>
  <text class="note" x="-68" y="-2.5">3 ears, M2.5 screws into plywood</text>

  <!-- Retaining ring -->
  <line class="lead" x1="4.6" y1="5.7" x2="32" y2="12"/>
  <text class="lbl"  x="33" y="13">retaining ring / splined washer</text>

  <!-- Shaft -->
  <line class="lead" x1="3" y1="14" x2="32" y2="22"/>
  <text class="lbl"  x="33" y="23">shaft (OD 6 mm)</text>
  <text class="note" x="33" y="25.5">through Ø 6.5 clearance hole</text>

  <!-- Paddle -->
  <line class="lead" x1="7" y1="23" x2="32" y2="32"/>
  <text class="lbl"  x="33" y="33">paddle (tangent to string)</text>
  <text class="note" x="33" y="35.5">nose pin r 0.8, 0.6 over-travel</text>

  <!-- Plywood label -->
  <line class="lead" x1="-30" y1="9" x2="-42" y2="-2"/>
  <text class="lbl"  x="-78" y="-3">6 mm plywood (north sheet)</text>
  <text class="note" x="-78" y="-0.5">outer face carries the clicky flange</text>

  <line class="lead" x1="-30" y1="27.7" x2="-42" y2="40"/>
  <text class="lbl"  x="-78" y="41">6 mm plywood (south sheet)</text>

  <!-- Gap callout -->
  <line x1="40" y1="12"   x2="40" y2="24.7"
        stroke="#333" stroke-width="0.3"
        marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text class="dim" x="42" y="19">12.7 mm gap</text>

  <!-- Plywood thickness callout (north) -->
  <line x1="-55" y1="6"  x2="-55" y2="12"
        stroke="#333" stroke-width="0.3"
        marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text class="dim" x="-65" y="9.5">6 mm</text>

  <!-- Barrel OD callout -->
  <line x1="-12" y1="-30" x2="-6" y2="-30"
        stroke="#333" stroke-width="0.3"
        marker-end="url(#arr)"/>
  <line x1="12" y1="-30" x2="6" y2="-30"
        stroke="#333" stroke-width="0.3"
        marker-end="url(#arr)"/>
  <text class="dim" x="-20" y="-31.5">OD 12 mm</text>

  <!-- String label -->
  <line class="lead" x1="1.5" y1="25.0" x2="14" y2="40"/>
  <text class="lbl"  x="15" y="41">string (1 mm dia, end-on)</text>
  <text class="note" x="15" y="43.5">paddle engages at nat/sharp pitch</text>

</svg>
