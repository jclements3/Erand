<?xml version="1.0" encoding="UTF-8"?>
<!--
  packing.svg - Top-down view of the 94-clicky packing layout along the
  neck gap. Bonus deliverable.

  What you're looking at: the neck cross-section seen from above. The two
  6 mm plywood sheets are the two brown bars. Strings are the red dots
  passing vertically through the 12.7 mm gap. For each string we draw
  TWO clicky barrels, one per pedal position (flat pedal = north side,
  sharp pedal = south side). Adjacent clickies alternate which side of
  which plywood sheet they mount to - the "guitar-tuner stagger".

  Scale: 1 mm = 1 user unit.
  We show ~10 strings near the treble end (strings 38-47) since that's
  the tightest packing.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="260mm" height="120mm"
     viewBox="0 0 260 120">

  <defs>
    <style>
      .ply    { fill:#c8a464; stroke:#222; stroke-width:0.3; }
      .gap    { fill:#fafafa; stroke:none; }
      .str    { fill:#c00000; stroke:#700; stroke-width:0.2; }
      .barrel { fill:#f0d8a0; stroke:#222; stroke-width:0.3; }
      .flat_b { fill:#b0d4ef; stroke:#123; stroke-width:0.3; }
      .sharp_b{ fill:#efc4b0; stroke:#321; stroke-width:0.3; }
      .lbl    { font-family:sans-serif; font-size:2.6px; fill:#111; font-weight:600; }
      .note   { font-family:sans-serif; font-size:2.2px; fill:#333; }
      .dim    { stroke:#333; stroke-width:0.25; fill:none; }
    </style>
  </defs>

  <text class="lbl" x="4" y="7">Treble-end packing (strings 38-47), top view, 1:1 mm</text>
  <text class="note" x="4" y="11">String spacing ~17.4 mm. Alternating flat(N)/sharp(S) stagger gives 34.8 mm per side.</text>
  <text class="note" x="4" y="14">Clicky barrels shown OD 12 mm. Flat paddles on north sheet, sharp on south.</text>

  <!-- North plywood sheet: top bar -->
  <rect class="ply" x="0" y="30" width="260" height="6"/>
  <text class="lbl" x="4" y="34.5">NORTH 6 mm plywood  (carries flat-pedal clickies)</text>

  <!-- 12.7 mm string gap -->
  <rect class="gap" x="0" y="36" width="260" height="12.7"/>
  <text class="note" x="4" y="42.8">12.7 mm gap (strings run here)</text>

  <!-- South plywood sheet -->
  <rect class="ply" x="0" y="48.7" width="260" height="6"/>
  <text class="lbl" x="4" y="53.2">SOUTH 6 mm plywood  (carries sharp-pedal clickies)</text>

  <!-- Strings 38..47, spaced 17.4 mm. First string at x=15.
       For each string we draw:
         - red dot in the gap (string cross section)
         - flat-pedal clicky barrel OD 12 mm on the NORTH side, protruding
           up into the north sheet (y = 30 to 18).
         - sharp-pedal clicky barrel OD 12 mm on the SOUTH side,
           protruding down (y = 54.7 to 66.7). -->

  <!-- Per-string block: string dot + flat barrel (north) + sharp barrel (south) + labels. -->
  <g>
    <g transform="translate(15,0)"   ><circle class="str" cx="0" cy="42.35" r="0.4"/><rect class="flat_b" x="-6" y="18" width="12" height="12" rx="1"/><text class="note" x="-6" y="17">F6</text><rect class="sharp_b" x="-6" y="54.7" width="12" height="12" rx="1"/><text class="note" x="-6" y="72">F6</text></g>
    <g transform="translate(32.4,0)" ><circle class="str" cx="0" cy="42.35" r="0.4"/><rect class="flat_b" x="-6" y="18" width="12" height="12" rx="1"/><text class="note" x="-6" y="17">G6</text><rect class="sharp_b" x="-6" y="54.7" width="12" height="12" rx="1"/><text class="note" x="-6" y="72">G6</text></g>
    <g transform="translate(49.8,0)" ><circle class="str" cx="0" cy="42.35" r="0.4"/><rect class="flat_b" x="-6" y="18" width="12" height="12" rx="1"/><text class="note" x="-6" y="17">A6</text><rect class="sharp_b" x="-6" y="54.7" width="12" height="12" rx="1"/><text class="note" x="-6" y="72">A6</text></g>
    <g transform="translate(67.2,0)" ><circle class="str" cx="0" cy="42.35" r="0.4"/><rect class="flat_b" x="-6" y="18" width="12" height="12" rx="1"/><text class="note" x="-6" y="17">B6</text><rect class="sharp_b" x="-6" y="54.7" width="12" height="12" rx="1"/><text class="note" x="-6" y="72">B6</text></g>
    <g transform="translate(84.6,0)" ><circle class="str" cx="0" cy="42.35" r="0.4"/><rect class="flat_b" x="-6" y="18" width="12" height="12" rx="1"/><text class="note" x="-6" y="17">C7</text><rect class="sharp_b" x="-6" y="54.7" width="12" height="12" rx="1"/><text class="note" x="-6" y="72">C7</text></g>
    <g transform="translate(102,0)"  ><circle class="str" cx="0" cy="42.35" r="0.4"/><rect class="flat_b" x="-6" y="18" width="12" height="12" rx="1"/><text class="note" x="-6" y="17">D7</text><rect class="sharp_b" x="-6" y="54.7" width="12" height="12" rx="1"/><text class="note" x="-6" y="72">D7</text></g>
    <g transform="translate(119.4,0)"><circle class="str" cx="0" cy="42.35" r="0.4"/><rect class="flat_b" x="-6" y="18" width="12" height="12" rx="1"/><text class="note" x="-6" y="17">E7</text><rect class="sharp_b" x="-6" y="54.7" width="12" height="12" rx="1"/><text class="note" x="-6" y="72">E7</text></g>
    <g transform="translate(136.8,0)"><circle class="str" cx="0" cy="42.35" r="0.4"/><rect class="flat_b" x="-6" y="18" width="12" height="12" rx="1"/><text class="note" x="-6" y="17">F7</text><rect class="sharp_b" x="-6" y="54.7" width="12" height="12" rx="1"/><text class="note" x="-6" y="72">F7</text></g>
    <g transform="translate(154.2,0)"><circle class="str" cx="0" cy="42.35" r="0.4"/><rect class="flat_b" x="-6" y="18" width="12" height="12" rx="1"/><text class="note" x="-6" y="17">G7</text><rect class="sharp_b" x="-6" y="54.7" width="12" height="12" rx="1"/><text class="note" x="-6" y="72">G7</text></g>
  </g>

  <!-- Collision annotation: adjacent barrels touch at 12 mm OD with
       17.4 mm spacing => 5.4 mm edge clearance. OK. -->
  <line class="dim" x1="15"   y1="84" x2="32.4" y2="84"
        marker-start="url(#x)" marker-end="url(#x)"/>
  <text class="note" x="17" y="83">17.4 mm spacing -&gt; 5.4 mm barrel-edge clearance</text>

  <!-- Alternative: if barrels are OD 14 the clearance drops to 3.4 mm.
       If OD 16 they collide - need stagger below/above (along x-axis). -->
  <text class="note" x="4" y="95">If clicky OD &gt; 17.4 mm: must stagger two rows per side (double the barrel height budget).</text>
  <text class="note" x="4" y="99">Current design target: OD 12 mm slim print. Barrel length 16-20 mm axially (into plywood face).</text>
  <text class="note" x="4" y="103">Paddle occupies the 12.7 mm gap partially (5 mm thick leaves 7.7 mm for string oscillation envelope).</text>

  <!-- scale bar -->
  <g transform="translate(180,90)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#111" stroke-width="0.4"/>
    <line x1="0" y1="-1" x2="0" y2="1" stroke="#111" stroke-width="0.4"/>
    <line x1="20" y1="-1" x2="20" y2="1" stroke="#111" stroke-width="0.4"/>
    <text class="note" x="2" y="-1.5">20 mm</text>
  </g>
</svg>
