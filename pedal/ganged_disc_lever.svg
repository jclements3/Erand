<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 900" width="700" height="900">
  <title>Ganged disc-lever mechanism — schematic</title>

  <!-- background -->
  <rect x="0" y="0" width="700" height="900" fill="#ffffff"/>

  <!-- title -->
  <text x="350" y="30" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#222">
    Ganged disc-lever mechanism (one pitch class)
  </text>
  <text x="350" y="50" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#555">
    Schematic — not to scale — outboard face of north neck plate
  </text>

  <!-- neck plate outline -->
  <rect x="200" y="80" width="140" height="720" fill="#e4d4b5" fill-opacity="0.4" stroke="#6b4a2a" stroke-width="1.5"/>
  <text x="270" y="100" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#6b4a2a">neck plate</text>
  <text x="270" y="113" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b4a2a">(outboard face)</text>

  <!-- rod running along the plate - rigid CF rod -->
  <line x1="320" y1="150" x2="320" y2="760" stroke="#8b4513" stroke-width="3"/>
  <text x="340" y="145" font-family="sans-serif" font-size="11" fill="#8b4513">rigid rod (CF, Ø2 mm)</text>
  <text x="340" y="158" font-family="sans-serif" font-size="10" fill="#8b4513">all Cs linked to this rod</text>

  <!-- 5 discs with crank arms along the rod -->
  <g id="disc-stack">
    <!-- C7 -->
    <g transform="translate(270, 180)">
      <circle cx="0" cy="0" r="20" fill="#d4c59c" stroke="#222" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="4" fill="#222"/>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#222" stroke-width="2"/>
      <circle cx="50" cy="0" r="3" fill="#8b4513"/>
      <text x="-42" y="5" font-family="sans-serif" font-size="11" text-anchor="end" fill="#333">C7 disc</text>
      <text x="-42" y="18" font-family="sans-serif" font-size="9" text-anchor="end" fill="#555">(axle, crank, detent)</text>
    </g>
    <!-- C6 -->
    <g transform="translate(270, 280)">
      <circle cx="0" cy="0" r="20" fill="#d4c59c" stroke="#222" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="4" fill="#222"/>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#222" stroke-width="2"/>
      <circle cx="50" cy="0" r="3" fill="#8b4513"/>
      <text x="-42" y="5" font-family="sans-serif" font-size="11" text-anchor="end" fill="#333">C6 disc</text>
    </g>
    <!-- C5 -->
    <g transform="translate(270, 380)">
      <circle cx="0" cy="0" r="20" fill="#d4c59c" stroke="#222" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="4" fill="#222"/>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#222" stroke-width="2"/>
      <circle cx="50" cy="0" r="3" fill="#8b4513"/>
      <text x="-42" y="5" font-family="sans-serif" font-size="11" text-anchor="end" fill="#333">C5 disc</text>
    </g>
    <!-- C4 -->
    <g transform="translate(270, 480)">
      <circle cx="0" cy="0" r="20" fill="#d4c59c" stroke="#222" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="4" fill="#222"/>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#222" stroke-width="2"/>
      <circle cx="50" cy="0" r="3" fill="#8b4513"/>
      <text x="-42" y="5" font-family="sans-serif" font-size="11" text-anchor="end" fill="#333">C4 disc</text>
    </g>
    <!-- C3 -->
    <g transform="translate(270, 580)">
      <circle cx="0" cy="0" r="20" fill="#d4c59c" stroke="#222" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="4" fill="#222"/>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#222" stroke-width="2"/>
      <circle cx="50" cy="0" r="3" fill="#8b4513"/>
      <text x="-42" y="5" font-family="sans-serif" font-size="11" text-anchor="end" fill="#333">C3 disc</text>
    </g>
    <!-- C2 -->
    <g transform="translate(270, 680)">
      <circle cx="0" cy="0" r="20" fill="#d4c59c" stroke="#222" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="4" fill="#222"/>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#222" stroke-width="2"/>
      <circle cx="50" cy="0" r="3" fill="#8b4513"/>
      <text x="-42" y="5" font-family="sans-serif" font-size="11" text-anchor="end" fill="#333">C2 disc</text>
    </g>
  </g>

  <!-- legend for crank arm detail -->
  <g transform="translate(480, 180)">
    <rect x="-10" y="-30" width="180" height="120" fill="#f8f5ee" stroke="#6b4a2a" stroke-width="1"/>
    <text x="0" y="-15" font-family="sans-serif" font-size="11" font-weight="bold" fill="#333">Crank detail (one disc):</text>
    <circle cx="30" cy="40" r="15" fill="#d4c59c" stroke="#222" stroke-width="1"/>
    <circle cx="30" cy="40" r="3" fill="#222"/>
    <line x1="30" y1="40" x2="65" y2="40" stroke="#222" stroke-width="2"/>
    <circle cx="65" cy="40" r="2.5" fill="#8b4513"/>
    <text x="30" y="18" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#333">disc</text>
    <text x="30" y="74" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#333">(Ø10 mm)</text>
    <text x="80" y="35" font-family="sans-serif" font-size="9" fill="#8b4513">crank tip</text>
    <text x="80" y="46" font-family="sans-serif" font-size="9" fill="#8b4513">(to rod)</text>
    <line x1="30" y1="40" x2="30" y2="15" stroke="#666" stroke-width="0.5" stroke-dasharray="2 2"/>
    <text x="15" y="55" font-family="sans-serif" font-size="8" fill="#666">Ø3 axle</text>
  </g>

  <!-- rod connection callout -->
  <line x1="320" y1="380" x2="400" y2="420" stroke="#888" stroke-width="0.5"/>
  <text x="405" y="425" font-family="sans-serif" font-size="10" fill="#555">pull up → all crank tips rise → all axles rotate 180°</text>
  <text x="405" y="438" font-family="sans-serif" font-size="10" fill="#555">→ all C discs engage simultaneously</text>

  <!-- bell crank at base -->
  <g transform="translate(270, 770)">
    <!-- bell crank -->
    <line x1="50" y1="-10" x2="50" y2="20" stroke="#8b4513" stroke-width="3"/>
    <circle cx="50" cy="-10" r="3" fill="#8b4513"/>
    <line x1="50" y1="20" x2="0" y2="40" stroke="#222" stroke-width="2"/>
    <circle cx="50" cy="20" r="4" fill="#222"/>
    <circle cx="0" cy="40" r="3" fill="#444"/>
    <text x="65" y="5" font-family="sans-serif" font-size="10" fill="#333">rod end</text>
    <text x="65" y="22" font-family="sans-serif" font-size="10" fill="#333">bell crank pivot</text>
  </g>

  <!-- lever at base -->
  <g transform="translate(270, 820)">
    <rect x="-80" y="-5" width="70" height="12" fill="#444" stroke="#222" stroke-width="1.2"/>
    <circle cx="-10" cy="1" r="4" fill="#444"/>
    <text x="-45" y="22" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">C lever</text>
    <text x="-45" y="36" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#555">(pull up = engage all Cs)</text>
    <!-- motion arrow -->
    <path d="M -90 -10 L -90 -30 M -95 -25 L -90 -30 L -85 -25" stroke="#0a6" stroke-width="1.5" fill="none"/>
    <text x="-115" y="-18" font-family="sans-serif" font-size="9" fill="#0a6">engage</text>
    <path d="M -90 10 L -90 30 M -95 25 L -90 30 L -85 25" stroke="#a60" stroke-width="1.5" fill="none"/>
    <text x="-115" y="27" font-family="sans-serif" font-size="9" fill="#a60">disengage</text>
  </g>

  <!-- notes -->
  <text x="350" y="870" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#555">
    One lever + one rod drives all 6-7 discs of one pitch class simultaneously.
  </text>
  <text x="350" y="885" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#555">
    7 pitch classes (C/D/E/F/G/A/B) = 7 levers, 7 rods, 47 discs + 47 bell cranks.
  </text>
</svg>
