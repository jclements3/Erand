<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded-corner background (harp bronze) -->
  <rect width="512" height="512" rx="80" fill="#8b4513"/>
  <!-- Simplified harp silhouette: column, neck curve, soundbox, soundboard -->
  <g transform="translate(80,60)" fill="none" stroke="#e4d4b5" stroke-width="18" stroke-linejoin="round" stroke-linecap="round">
    <!-- Column -->
    <line x1="0" y1="40" x2="0" y2="380"/>
    <!-- Neck curve over the top -->
    <path d="M 0 40 C 60 10, 200 10, 300 80 C 340 110, 350 140, 340 160"/>
    <!-- Soundbox tapered teardrop -->
    <path d="M 0 380 Q 80 380, 200 300 T 340 160" />
  </g>
  <!-- Strings (simplified — 5 representative) -->
  <g stroke="#d4c59c" stroke-width="3">
    <line x1="120" y1="100"  x2="120" y2="440"/>
    <line x1="170" y1="115"  x2="170" y2="408"/>
    <line x1="220" y1="130"  x2="220" y2="378"/>
    <line x1="270" y1="150"  x2="270" y2="342"/>
    <line x1="320" y1="175"  x2="320" y2="305"/>
  </g>
</svg>
